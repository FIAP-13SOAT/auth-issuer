name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o bootstrap main.go

      - name: Test
        run: go test ./...

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t auth-image .
          docker tag auth-image $ECR_REGISTRY/garage-auth-issuer:$IMAGE_TAG
          docker tag auth-image $ECR_REGISTRY/garage-auth-issuer:latest
          docker tag auth-image $ECR_REGISTRY/garage-auth-validator:$IMAGE_TAG
          docker tag auth-image $ECR_REGISTRY/garage-auth-validator:latest
          docker push $ECR_REGISTRY/garage-auth-issuer:$IMAGE_TAG
          docker push $ECR_REGISTRY/garage-auth-issuer:latest
          docker push $ECR_REGISTRY/garage-auth-validator:$IMAGE_TAG
          docker push $ECR_REGISTRY/garage-auth-validator:latest

  deploy:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update Lambda functions
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name GarageAuthIssuerFunction \
            --image-uri $ECR_REGISTRY/garage-auth-issuer:$IMAGE_TAG
          aws lambda update-function-code \
            --function-name GarageAuthValidatorFunction \
            --image-uri $ECR_REGISTRY/garage-auth-validator:$IMAGE_TAG
